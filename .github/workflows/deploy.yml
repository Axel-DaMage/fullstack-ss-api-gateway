name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/sanossalvos"
          overwrite: true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USER,DOCKER_PASS
          script: |
            cd /opt/sanossalvos

            # Login a Docker Hub en el EC2
            echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin

            # Pull todas las imágenes desde Docker Hub
            docker pull axeldamage/fullstack-ss-pet-service:latest
            docker pull axeldamage/fullstack-ss-geo-service:latest
            docker pull axeldamage/fullstack-ss-match-service:latest
            docker pull axeldamage/fullstack-ss-bff:latest
            docker pull axeldamage/fullstack-ss-api-gateway:latest
            docker pull axeldamage/fullstack-ss-frontend:latest

            # Levantar todo el stack
            docker compose -f docker-compose.prod.yml up -d

            # Limpiar imágenes antiguas
            docker image prune -f

            # Verificar estado
            docker compose -f docker-compose.prod.yml ps