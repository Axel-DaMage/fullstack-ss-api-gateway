name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy stack via SSM
        run: |
          INSTANCE_ID="i-06676ccf8b20826c9"
          COMMAND_ID=$(aws ssm send-command 
            --instance-ids "$INSTANCE_ID" 
            --document-name "AWS-RunShellScript" 
            --parameters 'commands=[
              "set -e",
              "mkdir -p /opt/sanossalvos",
              "curl -fsSL -o /opt/sanossalvos/docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml",
              "cd /opt/sanossalvos",
              "docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}",
              "docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d",
              "sleep 20",
              "docker compose -f docker-compose.prod.yml ps",
              "echo === PET-SERVICE LOGS === && docker logs pet-service 2>&1 | head -60"
            ]' 
            --region us-east-1 
            --output text 
            --query 'Command.CommandId')
          echo "SSM command sent: $COMMAND_ID"
          echo "Waiting for SSM command to complete..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 || true
          aws ssm get-command-invocation 
            --command-id "$COMMAND_ID" 
            --instance-id "$INSTANCE_ID" 
            --region us-east-1 
            --query 'StandardOutputContent' 
            --output text || echo "Could not get SSM result"