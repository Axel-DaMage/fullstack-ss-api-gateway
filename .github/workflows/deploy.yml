name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Find target EC2 instance
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text 2>/dev/null || echo "None")

          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
            echo "instance-exists=true" >> $GITHUB_OUTPUT
          else
            echo "instance-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get EC2 public IP
        if: steps.find-instance.outputs.instance-exists == 'true'
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "${{ steps.find-instance.outputs.instance-id }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "EC2 public IP: $PUBLIC_IP"
          echo "public-ip=$PUBLIC_IP" >> $GITHUB_OUTPUT
        id: get-ip

      - name: Deploy stack via SSM
        if: steps.find-instance.outputs.instance-exists == 'true'
        run: |
          INSTANCE_ID="${{ steps.find-instance.outputs.instance-id }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -e",
              "mkdir -p /opt/sanossalvos",
              "curl -fsSL -o /opt/sanossalvos/docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml",
              "cd /opt/sanossalvos",
              "docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}",
              "docker compose -f docker-compose.prod.yml pull",
              "docker compose -f docker-compose.prod.yml up -d",
              "sleep 20",
              "docker compose -f docker-compose.prod.yml ps",
              "docker ps --filter name=pet-service --format status={{.Status}}",
              "docker inspect pet-service --format={{.State.Status}} 2>/dev/null || echo pet-service not found"
            ]' \
            --region us-east-1 \
            --output text \
            --query 'Command.CommandId')
          echo "SSM command sent: $COMMAND_ID"
          
          # Wait for SSM to complete and show result
          echo "Waiting for SSM command to complete..."
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 || true
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region us-east-1 \
            --query '{Status:Status,StatusCode:ResponseCode,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output table || echo "Could not get SSM result"
