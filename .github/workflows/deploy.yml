name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Find target EC2 instance
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text 2>/dev/null || echo "None")

          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
            echo "instance-exists=true" >> $GITHUB_OUTPUT
          else
            echo "instance-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy stack via SSM
        if: steps.find-instance.outputs.instance-exists == 'true'
        shell: bash
        run: |
          INSTANCE_ID="${{ steps.find-instance.outputs.instance-id }}"

          # Build commands JSON safely using Python
          python3 -c "
import json, os
commands = [
    'set -e',
    'mkdir -p /opt/sanossalvos',
    'curl -fsSL -o /opt/sanossalvos/docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml',
    'cd /opt/sanossalvos',
    'docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} 2>/dev/null || true',
    'docker compose -f docker-compose.prod.yml pull',
    'docker compose -f docker-compose.prod.yml up -d',
    'sleep 30',
    'docker compose -f docker-compose.prod.yml ps',
    'curl -s -o /dev/null -w \"http code: %{http_code}\" http://api-gateway:8080/actuator/health || echo gateway_not_ready'
]
with open('/tmp/ssm-commands.json', 'w') as f:
    json.dump({'commands': commands}, f)
"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-commands.json \
            --region us-east-1 \
            --output text \
            --query 'Command.CommandId')
          echo "SSM command sent: $COMMAND_ID"

          # Wait for SSM to complete and show result
          echo "Waiting for SSM command to complete..."
          if aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --region us-east-1 2>/dev/null; then
            echo "SSM command completed successfully"
          else
            echo "SSM command failed or timed out"
          fi

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region us-east-1 \
            --query '{Status:Status,StatusCode:ResponseCode,Output:StandardOutputContent}' \
            --output text || echo "Could not get SSM result"