name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Upload docker-compose to S3
        run: |
          aws s3 cp docker-compose.prod.yml s3://sanossalvos-deploy-339713108279/docker-compose.prod.yml

      - name: Deploy via SSM
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          B64_USER=$(echo -n "$DOCKER_USER" | base64 -w0)
          B64_PASS=$(echo -n "$DOCKER_PASS" | base64 -w0)
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "mkdir -p /opt/sanossalvos",
              "aws s3 cp s3://sanossalvos-deploy-339713108279/docker-compose.prod.yml /opt/sanossalvos/docker-compose.yml",
              "echo '"$B64_USER"' | base64 -d > /tmp/docker_user",
              "echo '"$B64_PASS"' | base64 -d > /tmp/docker_pass",
              "docker login -u $(cat /tmp/docker_user) --password-stdin < /tmp/docker_pass",
              "rm /tmp/docker_user /tmp/docker_pass",
              "docker compose -f /opt/sanossalvos/docker-compose.yml pull",
              "docker compose -f /opt/sanossalvos/docker-compose.yml up -d",
              "docker image prune -f"
            ]}' \
            --region us-east-1
