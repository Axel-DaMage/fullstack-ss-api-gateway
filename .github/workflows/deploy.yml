name: Deploy Full Stack to AWS EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Find target EC2 instance
        id: find-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ secrets.EC2_INSTANCE_NAME }}" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text 2>/dev/null || echo "None")

          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT
            echo "instance-exists=true" >> $GITHUB_OUTPUT
          else
            echo "instance-exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy stack via SSM
        if: steps.find-instance.outputs.instance-exists == 'true'
        run: |
          INSTANCE_ID="${{ steps.find-instance.outputs.instance-id }}"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "mkdir -p /opt/sanossalvos",
              "curl -fsSL -o /opt/sanossalvos/docker-compose.prod.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.prod.yml",
              "cat > /opt/sanossalvos/.env <<'EOF'",
              "${{ secrets.PRODUCTION_ENV }}",
              "EOF",
              "cd /opt/sanossalvos",
              "echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin",
              "docker pull d4mag3/fullstack-ss-pet-service:latest",
              "docker pull d4mag3/fullstack-ss-geo-service:latest",
              "docker pull d4mag3/fullstack-ss-match-service:latest",
              "docker pull d4mag3/fullstack-ss-bff:latest",
              "docker pull d4mag3/fullstack-ss-api-gateway:latest",
              "docker pull d4mag3/fullstack-ss-frontend:latest",
              "docker compose -f docker-compose.prod.yml up -d",
              "docker image prune -f",
              "docker compose -f docker-compose.prod.yml ps"
            ]' \
            --region us-east-1 \
            --output text \
            --query 'Command.CommandId')
          echo "SSM command sent: $COMMAND_ID"
