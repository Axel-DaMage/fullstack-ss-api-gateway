name: Deploy to EC2 Edge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images
        run: |
          docker pull axeldamage/fullstack-ss-api-gateway:latest
          docker pull axeldamage/fullstack-ss-bff:latest
          docker pull axeldamage/fullstack-ss-frontend:latest
          docker pull axeldamage/fullstack-ss-pet-service:latest
          docker pull axeldamage/fullstack-ss-geo-service:latest
          docker pull axeldamage/fullstack-ss-match-service:latest

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_EDGE_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/opt/edge/docker-compose.yml"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_EDGE_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/edge
            docker-compose up -d