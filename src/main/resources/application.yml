server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 3000
        response-timeout: 10s
      routes:
        - id: pet-service
          uri: http://pet-service:3001
          predicates:
            - Path=/api/pets/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: petServiceCircuitBreaker
                fallbackUri: forward:/fallback/pet-service
        - id: geo-service
          uri: http://geo-service:3002
          predicates:
            - Path=/api/locations/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: geoServiceCircuitBreaker
                fallbackUri: forward:/fallback/geo-service
        - id: match-service
          uri: http://match-service:3003
          predicates:
            - Path=/api/matching/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: matchServiceCircuitBreaker
                fallbackUri: forward:/fallback/match-service
        - id: bff-service
          uri: http://bff-service:8081
          predicates:
            - Path=/api/**
          filters:
            - JwtAuthentication
            - name: CircuitBreaker
              args:
                name: bffCircuitBreaker
                fallbackUri: forward:/fallback/bff
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

resilience4j:
  timelimiter:
    config:
      default:
        timeoutDuration: 5s
    instances:
      bffCircuitBreaker:
        timeoutDuration: 10s
      petServiceCircuitBreaker:
        timeoutDuration: 10s
      geoServiceCircuitBreaker:
        timeoutDuration: 10s
      matchServiceCircuitBreaker:
        timeoutDuration: 10s
  circuitbreaker:
    config:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        slowCallRateThreshold: 100
        slowCallDurationThreshold: 2s
      instances:
        petServiceCircuitBreaker:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
        geoServiceCircuitBreaker:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
        matchServiceCircuitBreaker:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
        bffCircuitBreaker:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
  retry:
    config:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      instances:
        petServiceRetry:
          maxAttempts: 3
          waitDuration: 2s
        geoServiceRetry:
          maxAttempts: 3
          waitDuration: 2s
        matchServiceRetry:
          maxAttempts: 3
          waitDuration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    preferIpAddress: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.sanosysalvos: INFO
    io.github.resilience4j: DEBUG
